<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B1 Exam Final Fix - Mẫn</title>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }
        .q-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
        .crit { color: white; background: var(--d); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; margin-right: 5px; }
        .q-img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; margin: 10px 0; background: #f9f9f9; }
        .opt { width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 1rem; cursor: pointer; }
        .opt.selected { background: #3498db; color: white; border-color: #3498db; }
        .footer { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: var(--s) !important; color: white !important; display: block; width: 100%; }
        .hidden { display: none !important; }
        #review-list { margin-top: 15px; text-align: left; }
        .review-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading">🚀 Đang nạp 600 câu hỏi...</div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span id="prog">Câu 1/30</span>
            <span id="timer" style="color: #e67e22;">20:00</span>
        </div>
        <div id="q-area">
            <div id="q-body" class="q-text"></div>
            <div id="q-img-box"></div>
            <div id="opts-list"></div>
        </div>
        <div class="footer">
            <button onclick="move(-1)" id="btn-prev" style="background:#eee; color:#333;">Trước</button>
            <button onclick="move(1)" id="btn-next" class="btn-blue">Tiếp theo</button>
            <button onclick="finish()" id="btn-sub" class="btn-green hidden">NỘP BÀI (CÂU 30)</button>
        </div>
    </div>

    <div id="res-screen" class="hidden">
        <div style="text-align:center">
            <h2 id="res-status" style="margin-bottom:5px;"></h2>
            <h1 id="res-score" style="font-size: 4rem; margin: 0;">0/30</h1>
            <p id="res-note" style="margin-top:5px;"></p>
        </div>
        <hr>
        <h3 style="margin: 15px 0 10px 0;">Xem lại câu sai:</h3>
        <div id="review-list"></div>
        <button onclick="location.reload()" class="btn-blue" style="width:100%; margin-top:20px; padding:15px;">LÀM ĐỀ MỚI</button>
    </div>
</div>

<script>
    let db = [], exam = [], cur = 0, userA = {}, time = 1200;

    // Tự động load file JSON
    window.onload = async () => {
        try {
            const response = await fetch('questions_600_full.json');
            if (!response.ok) throw new Error();
            db = await response.json();
            document.getElementById('loading').classList.add('hidden');
            start();
        } catch (err) {
            document.getElementById('loading').innerHTML = "❌ Lỗi: Không tìm thấy file 'questions_600_full.json'<br><small>Hãy để file JSON cùng thư mục với file HTML này.</small>";
        }
    };

    function start() {
        document.getElementById('quiz-screen').classList.remove('hidden');
        // Trộn đề: 1 câu liệt + 29 câu thường
        const crits = db.filter(x => x.critical).sort(() => 0.5 - Math.random());
        const norms = db.filter(x => !x.critical).sort(() => 0.5 - Math.random());
        exam = [crits[0], ...norms.slice(0, 29)].sort(() => 0.5 - Math.random());
        
        render();
        const clock = setInterval(() => {
            if (time <= 0) { clearInterval(clock); finish(); return; }
            time--;
            const m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        }, 1000);
    }

    function render() {
        const q = exam[cur];
        document.getElementById('prog').innerText = `Câu ${cur + 1}/30`;
        document.getElementById('q-body').innerHTML = (q.critical ? '<span class="crit">LIỆT</span>' : '') + q.q;
        
        // Hiển thị ảnh
        const imgBox = document.getElementById('q-img-box');
        imgBox.innerHTML = q.image ? `<img src="data:image/png;base64,${q.image}" class="q-img">` : '';

        // Hiển thị options
        const list = document.getElementById('opts-list');
        list.innerHTML = '';
        q.options.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = `opt ${userA[cur] === i ? 'selected' : ''}`;
            b.innerText = o;
            b.onclick = () => { userA[cur] = i; render(); };
            list.appendChild(b);
        });

        // Điều khiển nút bấm
        document.getElementById('btn-prev').style.visibility = (cur === 0) ? 'hidden' : 'visible';
        
        if (cur === 29) {
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-sub').classList.remove('hidden');
        } else {
            document.getElementById('btn-next').classList.remove('hidden');
            document.getElementById('btn-sub').classList.add('hidden');
        }
    }

    function move(s) {
        if (cur + s >= 0 && cur + s <= 29) {
            cur += s;
            render();
            window.scrollTo(0,0); // Cuộn lên đầu khi sang câu mới
        }
    }

    function finish() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('res-screen').classList.remove('hidden');
        window.scrollTo(0,0);

        let score = 0, failC = false, reviewHtml = '';
        
        exam.forEach((q, i) => {
            const isCorrect = (userA[i] === q.a);
            if (isCorrect) {
                score++;
            } else {
                if (q.critical) failC = true;
                reviewHtml += `<div class="review-item">
                    <p><b>Câu ${i+1}:</b> ${q.q}</p>
                    <p style="color:var(--d); margin:2px 0;">✘ Bạn chọn: ${q.options[userA[i]] || 'Bỏ trống'}</p>
                    <p style="color:var(--s); font-weight:bold; margin:2px 0;">✔ Đáp án đúng: ${q.options[q.a]}</p>
                </div>`;
            }
        });

        const pass = (score >= 27 && !failC);
        const status = document.getElementById('res-status');
        status.innerText = pass ? "ĐẠT (PASSED)" : "KHÔNG ĐẠT (FAILED)";
        status.style.color = pass ? "var(--s)" : "var(--d)";
        
        document.getElementById('res-score').innerText = `${score}/30`;
        document.getElementById('res-score').style.color = pass ? "var(--s)" : "var(--d)";
        document.getElementById('res-note').innerHTML = failC ? "Sai câu <b>điểm liệt</b> nên trượt." : (pass ? "Chúc mừng! Bạn đã đủ điểm." : "Bạn không đủ điểm đậu.");
        document.getElementById('review-list').innerHTML = reviewHtml || '<p style="text-align:center; color:var(--s)">Tuyệt vời! Bạn không sai câu nào.</p>';
    }
</script>
</body>
</html>
