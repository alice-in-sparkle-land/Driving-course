<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1 Theory - Data Driven Lab</title>
    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .question-text { font-size: 1.1rem; margin-bottom: 15px; font-weight: 600; }
        .critical { color: var(--danger); text-transform: uppercase; }
        .option { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; text-align: left; cursor: pointer; background: white; }
        .option.selected { background: #3498db; color: white; border-color: #3498db; }
        .hidden { display: none; }
        .controls { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="quiz-app">
    <div class="header">
        <div id="progress">Đang tải câu hỏi...</div>
        <div id="timer">20:00</div>
    </div>

    <div id="quiz-content">
        <div id="question-text" class="question-text"></div>
        <div id="options-list"></div>
        <div class="controls">
            <button onclick="prevQ()" style="background:#eee">Trước</button>
            <button id="next-btn" onclick="nextQ()" style="background:var(--primary); color:white">Tiếp theo</button>
            <button id="submit-btn" class="hidden" onclick="showResult()" style="background:var(--success); color:white">Nộp bài</button>
        </div>
    </div>

    <div id="result-content" class="result-screen hidden" style="text-align: center;">
        <h1 id="res-score" style="font-size: 3rem;">0/30</h1>
        <p id="res-detail"></p>
        <button onclick="location.reload()" style="background:#3498db; color:white; padding:10px">Làm đề khác</button>
    </div>
</div>

<script>
let allQuestions = [];
let currentExam = [];
let currentIndex = 0;
let userAnswers = {};

// 1. Fetch dữ liệu từ file JSON
async function loadData() {
    try {
        const response = await fetch('questions.json');
        allQuestions = await response.json();
        generateExam();
    } catch (error) {
        document.getElementById('question-text').innerText = "Lỗi tải dữ liệu. Hãy đảm bảo bạn chạy qua Live Server hoặc đẩy lên GitHub.";
    }
}

// 2. Thuật toán tạo đề: Lấy 1 câu điểm liệt ngẫu nhiên + 29 câu thường
function generateExam() {
    const criticals = allQuestions.filter(q => q.critical);
    const normals = allQuestions.filter(q => !q.critical);
    
    // Lấy 1 câu điểm liệt bắt buộc (đúng chuẩn thi B1)
    const randomCrit = criticals.sort(() => 0.5 - Math.random()).slice(0, 1);
    // Lấy 29 câu thường
    const randomNorms = normals.sort(() => 0.5 - Math.random()).slice(0, 29);
    
    currentExam = [...randomCrit, ...randomNorms].sort(() => 0.5 - Math.random());
    render();
}

function render() {
    if(currentExam.length === 0) return;
    const q = currentExam[currentIndex];
    document.getElementById('progress').innerText = `Câu ${currentIndex + 1}/30`;
    document.getElementById('question-text').innerHTML = `${q.critical ? '<span class="critical">[Điểm liệt] </span>' : ''}${q.q}`;

    const list = document.getElementById('options-list');
    list.innerHTML = '';
    q.options.forEach((opt, i) => {
        const b = document.createElement('button');
        b.className = `option ${userAnswers[currentIndex] === i ? 'selected' : ''}`;
        b.innerText = opt;
        b.onclick = () => { userAnswers[currentIndex] = i; render(); };
        list.appendChild(b);
    });

    document.getElementById('next-btn').classList.toggle('hidden', currentIndex === 29);
    document.getElementById('submit-btn').classList.toggle('hidden', currentIndex !== 29);
}

function nextQ() { if(currentIndex < 29) { currentIndex++; render(); } }
function prevQ() { if(currentIndex > 0) { currentIndex--; render(); } }

function showResult() {
    document.getElementById('quiz-content').classList.add('hidden');
    const res = document.getElementById('result-content');
    res.classList.remove('hidden');

    let score = 0;
    let failCrit = false;
    currentExam.forEach((q, i) => {
        if(userAnswers[i] === q.a) score++;
        else if(q.critical) failCrit = true;
    });

    const passed = score >= 27 && !failCrit;
    document.getElementById('res-score').innerText = `${score}/30`;
    document.getElementById('res-score').style.color = passed ? "var(--success)" : "var(--danger)";
    document.getElementById('res-detail').innerHTML = passed ? "CHÚC MỪNG BẠN ĐÃ ĐẬU!" : (failCrit ? "SAI CÂU ĐIỂM LIỆT - TRƯỢT" : "KHÔNG ĐỦ ĐIỂM ĐẬU");
}

loadData();
</script>
</body>
</html>
