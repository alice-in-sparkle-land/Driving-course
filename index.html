<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B1 Exam Lab - Mẫn</title>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --bg: #f0f2f5; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        /* Upload Area */
        .upload-zone { border: 2px dashed #3498db; padding: 30px; text-align: center; border-radius: 12px; cursor: pointer; background: #fdfdfd; }
        
        /* Header & Progress */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #timer { font-weight: bold; color: #e67e22; font-size: 1.1rem; }
        
        /* Question Content */
        .q-text { font-size: 1.1rem; font-weight: 600; line-height: 1.5; color: #2c3e50; margin-bottom: 15px; }
        .crit-label { background: var(--d); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-right: 8px; vertical-align: middle; }
        .q-img { width: 100%; max-height: 250px; object-fit: contain; margin: 10px 0; border-radius: 8px; background: #fafafa; }
        
        /* Options */
        .opt { width: 100%; text-align: left; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; background: white; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .opt:active { background: #f0f7ff; }
        .opt.selected { background: #3498db; color: white; border-color: #3498db; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }
        
        /* Navigation */
        .footer { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-nav { background: #eee; color: #444; }
        .btn-primary { background: var(--p); color: white; }
        .btn-success { background: var(--s); color: white; }
        
        .hidden { display: none; }
        .result-screen { text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-screen">
        <h2 style="text-align:center">Ôn Thi Lý Thuyết B1</h2>
        <p style="text-align:center; color: #666; font-size: 0.9rem;">Nạp file JSON đã trích xuất từ Colab để bắt đầu</p>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <p id="upload-msg">📁 Chọn file <b>questions.json</b></p>
            <input type="file" id="fileInput" class="hidden" accept=".json">
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span id="progress-text">Câu 1/30</span>
            <span id="timer">20:00</span>
        </div>
        <div id="q-content">
            <div id="q-body" class="q-text"></div>
            <div id="img-container"></div>
            <div id="options-list"></div>
        </div>
        <div class="footer">
            <button class="btn-nav" onclick="changeQ(-1)" id="prev-btn">Trước</button>
            <button class="btn-primary" onclick="changeQ(1)" id="next-btn">Tiếp theo</button>
            <button class="btn-success hidden" onclick="showResult()" id="sub-btn">Nộp bài</button>
        </div>
    </div>

    <div id="result-screen" class="hidden result-screen">
        <h2 id="res-status"></h2>
        <h1 id="res-score" style="font-size: 4rem; margin: 10px 0;">0/30</h1>
        <p id="res-detail" style="font-size: 1.1rem;"></p>
        <button class="btn-primary" style="width:100%; margin-top: 20px;" onclick="location.reload()">Làm đề mới</button>
    </div>
</div>

<script>
    let allData = [];
    let exam = [];
    let currentIdx = 0;
    let userAnswers = {};
    let timeLeft = 1200;

    // 1. Đọc file JSON
    document.getElementById('fileInput').onchange = function(e) {
        const reader = new FileReader();
        document.getElementById('upload-msg').innerText = "Đang tải dữ liệu...";
        reader.onload = function(event) {
            allData = JSON.parse(event.target.result);
            startQuiz();
        };
        reader.readAsText(e.target.files[0]);
    };

    // 2. Tạo đề 30 câu ngẫu nhiên
    function startQuiz() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        // B1 yêu cầu 30 câu, tối thiểu 1 câu liệt
        const crits = allData.filter(q => q.critical).sort(() => 0.5 - Math.random());
        const norms = allData.filter(q => !q.critical).sort(() => 0.5 - Math.random());
        
        exam = [crits[0], ...norms.slice(0, 29)].sort(() => 0.5 - Math.random());
        
        render();
        startTimer();
    }

    // 3. Hiển thị câu hỏi
    function render() {
        const q = exam[currentIdx];
        document.getElementById('progress-text').innerText = `Câu ${currentIdx + 1}/30`;
        
        // Chữ câu hỏi + Nhãn điểm liệt
        document.getElementById('q-body').innerHTML = 
            (q.critical ? '<span class="crit-label">ĐIỂM LIỆT</span>' : '') + q.q;

        // Hình ảnh (Nếu có)
        const imgDiv = document.getElementById('img-container');
        imgDiv.innerHTML = q.image ? `<img src="data:image/png;base64,${q.image}" class="q-img">` : '';

        // Danh sách đáp án
        const optDiv = document.getElementById('options-list');
        optDiv.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = `opt ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
            btn.innerText = opt;
            btn.onclick = () => { userAnswers[currentIdx] = i; render(); };
            optDiv.appendChild(btn);
        });

        // Điều hướng
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').classList.toggle('hidden', currentIdx === 29);
        document.getElementById('sub-btn').classList.toggle('hidden', currentIdx !== 29);
    }

    function changeQ(step) {
        currentIdx += step;
        render();
    }

    function startTimer() {
        const timerEl = document.getElementById('timer');
        const itv = setInterval(() => {
            if(timeLeft <= 0) { clearInterval(itv); showResult(); return; }
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            timerEl.innerText = `${m}:${s<10?'0':''}${s}`;
        }, 1000);
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        const screen = document.getElementById('result-screen');
        screen.classList.remove('hidden');

        let score = 0, failCrit = false;
        exam.forEach((q, i) => {
            if(userAnswers[i] === q.a) score++;
            else if(q.critical) failCrit = true;
        });

        const passed = score >= 27 && !failCrit;
        const status = document.getElementById('res-status');
        status.innerText = passed ? "ĐẠT (PASSED)" : "KHÔNG ĐẠT (FAILED)";
        status.style.color = passed ? "var(--s)" : "var(--d)";
        
        document.getElementById('res-score').innerText = `${score}/30`;
        document.getElementById('res-score').style.color = passed ? "var(--s)" : "var(--d)";
        document.getElementById('res-detail').innerHTML = failCrit 
            ? "<b>Lưu ý:</b> Bạn bị sai câu hỏi điểm liệt." 
            : (passed ? "Bạn đã đủ điều kiện đậu!" : "Bạn cần ít nhất 27 câu đúng.");
    }
</script>

</body>
</html>
