<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B1 Exam Final - Fix Kẹt</title>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }
        .q-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
        .crit { color: white; background: var(--d); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 5px; }
        .q-img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; margin: 10px 0; background: #f9f9f9; }
        .opt { width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 1rem; cursor: pointer; }
        .opt.selected { background: #3498db !important; color: white !important; border-color: #3498db; }
        .footer { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: var(--s) !important; color: white !important; }
        .hidden { display: none !important; }
        .review-item { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading">🚀 Đang nạp dữ liệu...</div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span id="prog">Câu 1/30</span>
            <span id="timer" style="color: #e67e22;">20:00</span>
        </div>
        <div id="q-area">
            <div id="q-body" class="q-text"></div>
            <div id="q-img-box"></div>
            <div id="opts-list"></div>
        </div>
        <div class="footer">
            <button onclick="move(-1)" id="btn-prev" style="background:#eee; color:#333;">Trước</button>
            <button onclick="move(1)" id="btn-next" class="btn-blue">Tiếp theo</button>
            <button onclick="finishQuiz()" id="btn-sub" class="btn-green hidden">NỘP BÀI</button>
        </div>
    </div>

    <div id="res-screen" class="hidden" style="text-align: center;">
        <h2 id="res-status"></h2>
        <h1 id="res-score" style="font-size: 4rem; margin: 0;">0/30</h1>
        <p id="res-note"></p>
        <hr>
        <h3 style="text-align: left;">Câu sai cần xem lại:</h3>
        <div id="review-list"></div>
        <button onclick="location.reload()" class="btn-blue" style="width:100%; margin-top:20px;">LÀM ĐỀ MỚI</button>
    </div>
</div>

<script>
    let db = [], exam = [], cur = 0, time = 1200;

    window.onload = async () => {
        try {
            const response = await fetch('questions_600_full.json');
            db = await response.json();
            document.getElementById('loading').classList.add('hidden');
            start();
        } catch (err) {
            document.getElementById('loading').innerText = "❌ Không tìm thấy file JSON.";
        }
    };

    function start() {
        document.getElementById('quiz-screen').classList.remove('hidden');
        const crits = db.filter(x => x.critical).sort(() => 0.5 - Math.random());
        const norms = db.filter(x => !x.critical).sort(() => 0.5 - Math.random());
        // Lấy đúng 30 câu và reset thuộc tính userChoice
        exam = [crits[0], ...norms.slice(0, 29)].sort(() => 0.5 - Math.random());
        exam.forEach(q => q.userChoice = null); 
        
        render();
        setInterval(() => {
            if(time > 0) {
                time--;
                const m = Math.floor(time/60), s = time%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            }
        }, 1000);
    }

    function render() {
        const q = exam[cur];
        document.getElementById('prog').innerText = `Câu ${cur + 1}/30`;
        document.getElementById('q-body').innerHTML = (q.critical ? '<span class="crit">LIỆT</span>' : '') + q.q;
        document.getElementById('q-img-box').innerHTML = q.image ? `<img src="data:image/png;base64,${q.image}" class="q-img">` : '';

        const list = document.getElementById('opts-list');
        list.innerHTML = '';
        q.options.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = `opt ${q.userChoice === i ? 'selected' : ''}`;
            b.innerText = o;
            b.onclick = () => { q.userChoice = i; render(); };
            list.appendChild(b);
        });

        document.getElementById('btn-prev').style.visibility = (cur === 0) ? 'hidden' : 'visible';
        document.getElementById('btn-next').classList.toggle('hidden', cur === 29);
        document.getElementById('btn-sub').classList.toggle('hidden', cur !== 29);
    }

    function move(s) { cur += s; render(); window.scrollTo(0,0); }

    function finishQuiz() {
        // Chuyển màn hình ngay lập tức
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('res-screen').classList.remove('hidden');
        window.scrollTo(0,0);

        let score = 0, failC = false, reviewHtml = '';
        
        exam.forEach((q, i) => {
            if (q.userChoice === q.a) {
                score++;
            } else {
                if (q.critical) failC = true;
                reviewHtml += `<div class="review-item">
                    <p><b>Câu ${i+1}:</b> ${q.q}</p>
                    <p style="color:var(--d)">✘ Sai: ${q.options[q.userChoice] || 'Bỏ trống'}</p>
                    <p style="color:var(--s); font-weight:bold;">✔ Đúng: ${q.options[q.a]}</p>
                </div>`;
            }
        });

        const pass = (score >= 27 && !failC);
        document.getElementById('res-status').innerText = pass ? "ĐẠT (PASSED)" : "KHÔNG ĐẠT (FAILED)";
        document.getElementById('res-status').style.color = pass ? "var(--s)" : "var(--d)";
        document.getElementById('res-score').innerText = `${score}/30`;
        document.getElementById('res-note').innerHTML = failC ? "Trượt vì sai câu <b>ĐIỂM LIỆT</b>." : "";
        document.getElementById('review-list').innerHTML = reviewHtml || "Tuyệt vời! Bạn đúng hết 30 câu.";
    }
</script>
</body>
</html>
