<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B1 Exam - Review Mode</title>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }
        
        /* Quiz Area */
        .q-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; }
        .crit { color: var(--d); border: 1px solid var(--d); padding: 1px 4px; border-radius: 3px; font-size: 0.7rem; margin-right: 5px; }
        .q-img { width: 100%; border-radius: 8px; margin: 10px 0; }
        .opt { width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 1rem; }
        .opt.selected { background: #3498db; color: white; border-color: #3498db; }
        
        /* Review Area */
        .review-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .txt-wrong { color: var(--d); text-decoration: line-through; }
        .txt-correct { color: var(--s); font-weight: bold; }
        
        .footer { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: var(--s); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-screen">
        <h3 style="text-align:center">Nạp câu hỏi B1</h3>
        <input type="file" id="fileInput" accept=".json" style="width: 100%; margin: 20px 0;">
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span id="prog">Câu 1/30</span>
            <span id="timer" style="color: #e67e22;">20:00</span>
        </div>
        <div id="q-area">
            <div id="q-body" class="q-text"></div>
            <div id="q-img-box"></div>
            <div id="opts-list"></div>
        </div>
        <div class="footer">
            <button onclick="move(-1)" id="btn-prev" style="background:#eee">Trước</button>
            <button onclick="move(1)" id="btn-next" class="btn-blue">Tiếp theo</button>
            <button onclick="finish()" id="btn-sub" class="btn-green hidden">Nộp bài (Câu 30)</button>
        </div>
    </div>

    <div id="res-screen" class="hidden">
        <div style="text-align:center">
            <h2 id="res-status"></h2>
            <h1 id="res-score" style="font-size: 3rem; margin: 0;">0/30</h1>
            <p id="res-note"></p>
        </div>
        <hr>
        <h4>Danh sách câu sai:</h4>
        <div id="review-list"></div>
        <button onclick="location.reload()" class="btn-blue" style="width:100%; margin-top:20px">Làm đề mới</button>
    </div>
</div>

<script>
    let db = [], exam = [], cur = 0, userA = {}, time = 1200;

    document.getElementById('fileInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            db = JSON.parse(ev.target.result);
            start();
        };
        reader.readAsText(e.target.files[0]);
    };

    function start() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        const crits = db.filter(x => x.critical).sort(() => 0.5 - Math.random());
        const norms = db.filter(x => !x.critical).sort(() => 0.5 - Math.random());
        // Lấy đúng 30 câu
        exam = [crits[0], ...norms.slice(0, 29)].sort(() => 0.5 - Math.random());
        
        render();
        const clock = setInterval(() => {
            time--;
            const m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(time <= 0) { clearInterval(clock); finish(); }
        }, 1000);
    }

    function render() {
        const q = exam[cur];
        document.getElementById('prog').innerText = `Câu ${cur + 1}/30`;
        document.getElementById('q-body').innerHTML = (q.critical ? '<span class="crit">LIỆT</span>' : '') + q.q;
        document.getElementById('q-img-box').innerHTML = q.image ? `<img src="data:image/png;base64,${q.image}" class="q-img">` : '';

        const list = document.getElementById('opts-list');
        list.innerHTML = '';
        q.options.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = `opt ${userA[cur] === i ? 'selected' : ''}`;
            b.innerText = o;
            b.onclick = () => { userA[cur] = i; render(); };
            list.appendChild(b);
        });

        document.getElementById('btn-prev').style.visibility = cur === 0 ? 'hidden' : 'visible';
        // Logic dừng ở câu 30
        const isLast = (cur === 29);
        document.getElementById('btn-next').classList.toggle('hidden', isLast);
        document.getElementById('btn-sub').classList.toggle('hidden', !isLast);
    }

    function move(s) { cur += s; render(); }

    function finish() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('res-screen').classList.remove('hidden');

        let score = 0, failC = false, reviewHtml = '';
        exam.forEach((q, i) => {
            const isCorrect = userA[i] === q.a;
            if(isCorrect) score++;
            else {
                if(q.critical) failC = true;
                // Tạo danh sách xem lại câu sai
                reviewHtml += `<div class="review-item">
                    <p><b>Câu ${i+1}:</b> ${q.q}</p>
                    <p class="txt-wrong">Bạn chọn: ${q.options[userA[i]] || 'Bỏ trống'}</p>
                    <p class="txt-correct">Đáp án đúng: ${q.options[q.a]}</p>
                </div>`;
            }
        });

        const pass = score >= 27 && !failC;
        document.getElementById('res-status').innerText = pass ? "ĐẠT" : "KHÔNG ĐẠT";
        document.getElementById('res-status').style.color = pass ? "var(--s)" : "var(--d)";
        document.getElementById('res-score').innerText = `${score}/30`;
        document.getElementById('res-note').innerHTML = failC ? "Sai câu <b>điểm liệt</b>." : `Đúng ${score}/30 câu.`;
        document.getElementById('review-list').innerHTML = reviewHtml || '<p>Chúc mừng! Bạn không sai câu nào.</p>';
    }
</script>
</body>
</html>
